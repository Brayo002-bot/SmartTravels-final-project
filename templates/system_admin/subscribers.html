{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Subscribers | SmartTravels</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex">{% include 'system_admin/sidebar.html' %}
  <div class="ml-64 w-full p-8">
    <h1 class="text-2xl font-bold mb-6">Newsletter Subscribers</h1>
    <div class="mb-6">
      <form method="POST">{% csrf_token %}
        <input type="hidden" name="action" value="send_email">
        <div class="grid md:grid-cols-2 gap-4">
          <input name="subject" placeholder="Subject" class="p-3 rounded border">
          <input name="body" placeholder="Message body" class="p-3 rounded border">
        </div>
        <button class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">Send to all subscribers</button>
      </form>
    </div>
    <div class="bg-white rounded p-6">
      <h2 class="font-bold mb-4">Subscribers</h2>
      <ul class="space-y-2">
        {% for s in subscribers %}
        <li class="flex items-center justify-between"><div>{{ s.email }}</div><div class="text-sm text-gray-500">{{ s.created_at }}</div></li>
        {% empty %}
        <li>No subscribers yet.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
</body>
</html>
