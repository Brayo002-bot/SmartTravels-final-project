{% extends 'base/base.html' %}
{% block title %}Book Parcel Delivery{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-2">📦 Book Parcel Delivery</h1>
  <p class="text-white/50 mb-8">Send packages safely across Kenya via bus, train, or flight routes.</p>
  <div class="st-card">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Sender Name</label>
          <input name="sender_name" value="{{ user.get_full_name }}" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Sender Phone</label>
          <input name="sender_phone" value="{{ user.phone_number }}" placeholder="0712 345 678" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Recipient Name</label>
          <input name="recipient_name" placeholder="Full name" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Recipient Phone</label>
          <input name="recipient_phone" placeholder="0712 345 678" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">From (Origin)</label>
          <input name="origin" placeholder="e.g. Nairobi" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">To (Destination)</label>
          <input name="destination" placeholder="e.g. Mombasa" class="st-input" required></div>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Category</label>
          <select name="category" class="st-input">
            <option value="documents">Documents</option><option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option><option value="food">Food</option>
            <option value="fragile">Fragile</option><option value="other">Other</option>
          </select></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Weight (kg)</label>
          <input name="weight_kg" type="number" step="0.1" min="0.1" value="1" class="st-input" required></div>
        <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Declared Value (KES)</label>
          <input name="declared_value" type="number" value="0" class="st-input"></div>
      </div>
      <div><label class="text-xs text-white/50 uppercase tracking-wide block mb-1">Description</label>
        <textarea name="description" placeholder="Brief description of contents" class="st-input h-20 resize-none"></textarea></div>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_fragile" class="w-4 h-4 accent-[#2979D9]">
        <span class="text-sm">Mark as Fragile — handle with care</span>
      </label>
      <div class="bg-amber-500/10 border border-amber-500/25 rounded-xl p-3 text-sm text-amber-300">
        💡 Pricing: KES 100 base + KES 50/kg. Cost calculated on submission.
      </div>
      <button type="submit" class="st-btn w-full py-3">📦 Book Parcel →</button>
    </form>
  </div>
</div>
{% endblock %}
