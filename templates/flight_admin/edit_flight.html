{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Flight</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="flex">
    {% include 'flight_admin/sidebar.html' %}
    <div class="ml-64 p-8 w-full">
        <h1 class="text-2xl font-bold mb-6">Edit Flight</h1>
        <div class="bg-white p-6 rounded-xl shadow mb-10">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block mb-2 font-semibold">Flight Number</label>
                        <input type="text" name="flight_number" value="{{ flight.flight_number }}" class="w-full p-3 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block mb-2 font-semibold">Route</label>
                        <select name="route" class="w-full p-3 border rounded-lg" required>
                            {% for route in routes %}
                                <option value="{{ route.id }}" {% if route.id == flight.route.id %}selected{% endif %}>
                                    {{ route.from_location }} → {{ route.to_location }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block mb-2 font-semibold">Pilot</label>
                        <select name="pilot" class="w-full p-3 border rounded-lg" required>
                            {% for pilot in pilots %}
                                <option value="{{ pilot.id }}" {% if pilot.id == flight.pilot.id %}selected{% endif %}>
                                    {{ pilot.name }} ({{ pilot.phone }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block mb-2 font-semibold">Description <span class="text-gray-500 text-sm">(optional, visible to passengers)</span></label>
                    <textarea name="description" class="w-full p-3 border rounded-lg" rows="4" placeholder="Brief description of the flight">{{ flight.description|default:'' }}</textarea>
                </div>
                <div class="flex gap-4">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-semibold">Update Flight</button>
                    <a href="{% url 'add_flights' %}" class="bg-gray-400 text-white px-6 py-3 rounded-lg hover:bg-gray-500 font-semibold">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
